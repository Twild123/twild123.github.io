<html>
<head>
    <meta name="viewport" content="width=device-width">
    <meta charset="UTF-8">
    <title>API Series y peliculas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>
    <section class="app-header bg-purple-gradient flex flex-row jc-space-between align-items-center">
        <div class="div-logo bg-gray"></div>
        <h1 class="font-lilita-one">Buscador de peliculas y series</h1>
        <div class="flex flex-row align-items-center gap8">
            <div class="control bg-gray"></div>
            <div class="control bg-gray"></div>
            <div class="control bg-gray"></div>
        </div>
    </section>

    <section class="app-main bg-lblack flex flex-row">
        <div class="app-sidebar bg-black flex flex-col gap6 pad16 align-self-center no-display">
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>
            <button class="items-sidebar bg-lblack border2"></button>


        </div>
        <div class="block-container bg-black flex flex-col align-self-center of-hidden bs-black20">
            <div class="nav-container flex flex-row br8">
                <div class="nav-title"><input type="text" class="cien-x-cien br16 border2" placeholder="Nombre de la pelicula..." id="movie-name"></div>
                <div class="nav-year"><input type="text" class="cien-x-cien br16 border2" placeholder="Año de la pelicula..."id="movie-year"></div>
                <div class="nav-page"><input type="text" class="cien-x-cien br16 border2" placeholder="Pag"id="movie-page"></div>
                <div class="nav-search"><button  class="cien-x-cien br16 border2" id="search-button"><img src="img/lupa.png"></button></div>
            </div>
            <div class="results bg-black flex flex-row wrap gap6 jc-center align-items-center" id="billboards">

            </div>
            
        </div>
    </section>
    <section class="app-footer bg-black"><p id="total-results" style="color:white"></p></section>
